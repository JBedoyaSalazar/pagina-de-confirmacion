<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmado</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="shortcut icon" href="./icons/check.png" type="image/x-icon">
</head>
<body>
    <section class="contenedor">
        <section class="sub-contenedor">
            <section class="contenido">
                <section class="icon">
                    <img src="./icons/logoPaypal.png" alt="paypalLogo">
                </section>
                <section class="mensaje">
                    <section class="title">
                        <h3>Pago realizado con exito</h3>
                        <section class="text">
                            <p>Gracias por su preferencia</p>
                        </section>
                    </section>
                </section>
            </section>
            <section class="actions">
                <button class="boton btn--descargar">Descargar</button>
                <button class="boton btn--volver">Volver</button>
            </section>
        </section>
    </section>
</body>
</html>
